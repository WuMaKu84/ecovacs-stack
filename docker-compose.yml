version: '3'

networks:
  ecovacs_stack:
    internal: true
services:
  mysql:
    image: mysql:latest
    ports:
      - 3306:3306
    environment:
      - MYSQL_ROOT_PASSWORD=dev
      - MYSQL_USER=dev
      - MYSQL_PASSWORD=dev
      - MYSQL_DATABASE=dev
      - TZ=America/New_York
    networks:
      ecovacs_stack:
      default:
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/mysql.conf.d:/etc/mysql/conf.d
      - ./mysql/scripts/init.sql:/docker-entrypoint-initdb.d/1.sql
    restart: unless-stopped

  backend:
    depends_on:
      - mysql
    image: ecovacs-backend:local
    networks:
      ecovacs_stack:
      default:
    volumes:
      - ./backend:/opt/app
    user: '${UID}:${GID}'
    environment:
      - BOTID=${BOTID}
      - BOTCLASS=${BOTCLASS}
      - RESOURCE=${RESOURCE}
      - HOST_IP=${HOST_IP}
      - BASE_URL=https://localhost
      - BASE_URL_01=https://ecovacs.com
      - BASE_URL_02=https://ecouser.net
      - BASE_URL_03=https://ecovacs.net
      - BASE_URL_04=https://iot-auth-global.aliyuncs.com
      - BASE_URL_05=https://public.iot-as-mqtt.cn-shanghai.aliyuncs.com
      - BASE_URL_06=https://jmq-ngiot-ch.area.ww.ecouser.net
      - MYSQL_USER=dev
      - MYSQL_PASSWORD=dev
      - MYSQL_DATABASE=dev
      - TZ=Europe/Zurich
    command: bash -c './generate_certs.sh && yarn install && yarn run dev'
    stdin_open: true
    restart: unless-stopped

  nginx:
    depends_on:
      - backend
    image: nginx:alpine
    ports:
      - 8883:8883
      - 443:443
      - 3001:3000
      - 8070:80
    networks:
      default:
      ecovacs_stack:
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - ./nginx/:/etc/nginx:ro
    restart: unless-stopped

  frontend:
    depends_on:
      - nginx
    image: ecovacs-frontend:local
    user: '${UID}:${GID}'
    environment:
      - REACT_APP_HOST_IP=${HOST_IP}
      - REACT_APP_WS_PORT=3001
      - WDS_SOCKET_PORT=0
      - TZ=Europe/Zurich
    networks:
      default:
    volumes:
      - ./frontend:/opt/app
    ports:
      - 4200:3000
    command: bash -c 'yarn install && yarn start'
    stdin_open: true
    restart: unless-stopped
